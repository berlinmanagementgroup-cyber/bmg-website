<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" role="img" aria-label="Automated tenant request flow: tenant request, auto-triage, dispatch to vendor, resolved and logged">
  <title>Automated tenant-request workflow for property managers</title>
  <defs>
    <marker id="agold" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#C8A951"/></marker>
  </defs>
  <rect width="800" height="220" fill="#ffffff"/>
  <text x="400" y="40" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1B2A4A" text-anchor="middle" letter-spacing="1">AUTOMATED TENANT-REQUEST FLOW</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">
    <rect x="32" y="68" width="160" height="70" rx="10" fill="#1B2A4A"/>
    <text x="112" y="108">Tenant request</text>
    <rect x="224" y="68" width="160" height="70" rx="10" fill="#1B2A4A"/>
    <text x="304" y="108">Auto-triage</text>
    <rect x="416" y="68" width="160" height="70" rx="10" fill="#1B2A4A"/>
    <text x="496" y="108">Dispatch to vendor</text>
    <rect x="608" y="68" width="160" height="70" rx="10" fill="#1B2A4A"/>
    <text x="688" y="108">Resolved and logged</text>
  </g>
  <g stroke="#C8A951" stroke-width="4">
    <line x1="196" y1="103" x2="220" y2="103" marker-end="url(#agold)"/>
    <line x1="388" y1="103" x2="412" y2="103" marker-end="url(#agold)"/>
    <line x1="580" y1="103" x2="604" y2="103" marker-end="url(#agold)"/>
  </g>
  <text x="400" y="186" font-family="Arial, Helvetica, sans-serif" font-size="14" font-style="italic" fill="#1B2A4A" text-anchor="middle">Every request handled start to finish, without manual chasing.</text>
</svg>
