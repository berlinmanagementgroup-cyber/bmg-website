<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-label="Workflow diagram comparing manual home-service operations with an automated BMG flow">
  <title>Manual home-service operations versus an automated BMG workflow</title>
  <defs>
    <marker id="agray" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#CBD2DC"/></marker>
    <marker id="agold" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#C8A951"/></marker>
  </defs>
  <rect width="800" height="340" fill="#ffffff"/>
  <text x="400" y="34" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#5A6577" text-anchor="middle" letter-spacing="1">BEFORE: MANUAL OPERATIONS</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5A6577" text-anchor="middle">
    <rect x="36" y="52" width="150" height="56" rx="8" fill="#F7F8FA" stroke="#CBD2DC" stroke-width="2"/>
    <text x="111" y="85">Missed calls</text>
    <rect x="228" y="52" width="150" height="56" rx="8" fill="#F7F8FA" stroke="#CBD2DC" stroke-width="2"/>
    <text x="303" y="85">Paper schedule</text>
    <rect x="420" y="52" width="150" height="56" rx="8" fill="#F7F8FA" stroke="#CBD2DC" stroke-width="2"/>
    <text x="495" y="85">Lost job status</text>
    <rect x="612" y="52" width="150" height="56" rx="8" fill="#F7F8FA" stroke="#CBD2DC" stroke-width="2"/>
    <text x="687" y="85">Late invoicing</text>
  </g>
  <g stroke="#CBD2DC" stroke-width="3" stroke-dasharray="5,4">
    <line x1="190" y1="80" x2="222" y2="80" marker-end="url(#agray)"/>
    <line x1="382" y1="80" x2="414" y2="80" marker-end="url(#agray)"/>
    <line x1="574" y1="80" x2="606" y2="80" marker-end="url(#agray)"/>
  </g>
  <text x="400" y="192" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1B2A4A" text-anchor="middle" letter-spacing="1">AFTER: AUTOMATED WITH BMG</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">
    <rect x="36" y="210" width="150" height="56" rx="8" fill="#1B2A4A"/>
    <text x="111" y="243">Lead captured</text>
    <rect x="228" y="210" width="150" height="56" rx="8" fill="#1B2A4A"/>
    <text x="303" y="243">Auto-dispatch</text>
    <rect x="420" y="210" width="150" height="56" rx="8" fill="#1B2A4A"/>
    <text x="495" y="243">Live job status</text>
    <rect x="612" y="210" width="150" height="56" rx="8" fill="#1B2A4A"/>
    <text x="687" y="243">Instant invoice</text>
  </g>
  <g stroke="#C8A951" stroke-width="4">
    <line x1="190" y1="238" x2="222" y2="238" marker-end="url(#agold)"/>
    <line x1="382" y1="238" x2="414" y2="238" marker-end="url(#agold)"/>
    <line x1="574" y1="238" x2="606" y2="238" marker-end="url(#agold)"/>
  </g>
  <text x="400" y="312" font-family="Arial, Helvetica, sans-serif" font-size="14" font-style="italic" fill="#1B2A4A" text-anchor="middle">Same operation. Automated end to end.</text>
</svg>
